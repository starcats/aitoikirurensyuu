<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>38 Game - ゲームポータル</title>
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

  body{
    font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans',sans-serif;
    min-height:100vh;
    background:linear-gradient(135deg,#e8f5e9 0%,#e3f2fd 50%,#fff8e1 100%);
    background-size:400% 400%;
    animation:bgShift 20s ease infinite;
    color:#3e4a40;
  }

  @keyframes bgShift{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
  }

  .container{
    max-width:720px;
    margin:0 auto;
    padding:48px 24px 64px;
    opacity:0;
    animation:fadeIn .8s ease forwards;
  }

  @keyframes fadeIn{to{opacity:1}}

  /* ---------- header ---------- */
  .header{
    text-align:center;
    margin-bottom:48px;
  }

  .header h1{
    font-size:1.6rem;
    font-weight:700;
    color:#4e6e52;
    letter-spacing:.06em;
    margin-bottom:8px;
  }

  .header p{
    font-size:.9rem;
    color:#7a8a7c;
    line-height:1.7;
  }

  /* ---------- game grid ---------- */
  .game-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:20px;
  }

  /* ---------- game card ---------- */
  .game-card{
    display:block;
    text-decoration:none;
    color:inherit;
    background:rgba(255,255,255,.72);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    border-radius:16px;
    padding:28px 28px 24px;
    box-shadow:0 4px 24px rgba(0,0,0,.06);
    border:1px solid rgba(255,255,255,.8);
    transition:transform .35s cubic-bezier(.34,1.56,.64,1),
               box-shadow .3s ease,
               background .3s ease;
  }

  .game-card:hover{
    transform:scale(1.03);
    background:rgba(255,255,255,.88);
    box-shadow:0 8px 32px rgba(0,0,0,.09);
  }

  .game-card:active{
    transform:scale(.98);
  }

  .card-day{
    display:inline-block;
    font-size:.75rem;
    font-weight:600;
    color:#fff;
    background:linear-gradient(135deg,#81c784,#64b5f6);
    border-radius:8px;
    padding:3px 10px;
    margin-bottom:12px;
    letter-spacing:.05em;
  }

  .card-title{
    font-size:1.15rem;
    font-weight:700;
    color:#4e6e52;
    margin-bottom:8px;
    line-height:1.4;
  }

  .card-desc{
    font-size:.85rem;
    color:#7a8a7c;
    line-height:1.65;
  }

  .card-arrow{
    display:block;
    text-align:right;
    margin-top:14px;
    font-size:.85rem;
    color:#a5d6a7;
    transition:color .3s ease;
  }

  .game-card:hover .card-arrow{
    color:#66bb6a;
  }

  /* ---------- coming soon ---------- */
  .coming-soon{
    display:flex;
    align-items:center;
    justify-content:center;
    background:rgba(255,255,255,.4);
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
    border-radius:16px;
    padding:28px;
    border:2px dashed rgba(160,200,170,.4);
    min-height:140px;
  }

  .coming-soon span{
    font-size:.9rem;
    color:#a0c8aa;
    letter-spacing:.04em;
  }

  /* ---------- footer ---------- */
  .footer{
    text-align:center;
    margin-top:56px;
    font-size:.78rem;
    color:#b0bfb2;
  }
</style>
</head>
<body>

<div class="container">
  <header class="header">
    <h1>38 Game</h1>
    <p>ひとつずつ、小さなゲームをつくっていく。</p>
  </header>

  <div class="game-grid">

    <a href="games/day01-text-adventure/index.html" class="game-card">
      <span class="card-day">Day 01</span>
      <div class="card-title">潮風の島</div>
      <div class="card-desc">テキストアドベンチャー。無人島で目を覚ます。潮の音を聴きながら、小さな冒険がはじまる。</div>
      <span class="card-arrow">あそぶ &rarr;</span>
    </a>

    <div class="coming-soon">
      <span>Day 02 - coming soon...</span>
    </div>

  </div>

  <footer class="footer">
    38 Game &mdash; a game a day
  </footer>
</div>

</body>
</html>
