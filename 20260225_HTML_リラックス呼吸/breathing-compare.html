<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>呼吸アニメーション比較</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #0d0d1f;
    font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    gap: 16px;
  }

  h1 {
    color: rgba(255,255,255,0.5);
    font-size: 0.85rem;
    letter-spacing: 0.15em;
    font-weight: 400;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    width: min(860px, 100%);
  }

  .card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 24px 16px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .stage {
    width: 120px;
    height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .label {
    font-size: 0.8rem;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.12em;
  }

  /* ===== 1. 泡 ===== */
  .bubble {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: radial-gradient(circle at 38% 36%, rgba(180,140,255,0.9), rgba(100,80,200,0.6));
    box-shadow: 0 0 24px rgba(140,100,255,0.4);
    animation: bubbleBreath 5s ease-in-out infinite;
  }

  @keyframes bubbleBreath {
    0%, 100% { transform: scale(0.55); opacity: 0.6; }
    50%       { transform: scale(1);    opacity: 1; }
  }

  /* ===== 2. 光輪 ===== */
  .halo {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    border: 2.5px solid rgba(160,200,255,0.8);
    box-shadow: 0 0 16px rgba(120,180,255,0.4),
                inset 0 0 16px rgba(120,180,255,0.1);
    animation: haloBreath 5s ease-in-out infinite;
  }

  @keyframes haloBreath {
    0%, 100% { transform: scale(0.55); opacity: 0.4; }
    50%       { transform: scale(1);    opacity: 1; }
  }

  /* ===== 3. 波紋 ===== */
  .ripple-wrap {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .ripple-core {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: rgba(180,220,255,0.9);
    box-shadow: 0 0 8px rgba(140,200,255,0.8);
    z-index: 1;
  }

  .ripple-ring {
    position: absolute;
    border-radius: 50%;
    border: 1.5px solid rgba(140,200,255,0.6);
    animation: rippleOut 5s ease-out infinite;
  }

  .ripple-ring:nth-child(2) { animation-delay: 0s; }
  .ripple-ring:nth-child(3) { animation-delay: 1.5s; }
  .ripple-ring:nth-child(4) { animation-delay: 3s; }

  @keyframes rippleOut {
    0%   { width: 14px; height: 14px; opacity: 0.8; }
    100% { width: 110px; height: 110px; opacity: 0; }
  }

  /* ===== 4. 霞 ===== */
  .haze {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(200,180,255,0.9) 0%, rgba(140,120,220,0) 70%);
    animation: hazeBreath 5s ease-in-out infinite;
    filter: blur(4px);
  }

  @keyframes hazeBreath {
    0%, 100% { transform: scale(0.4); opacity: 0.3; }
    50%       { transform: scale(1);   opacity: 1; }
  }

  /* ===== 5. 雫 ===== */
  .drop {
    width: 32px;
    height: 44px;
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    background: linear-gradient(180deg, rgba(160,220,255,0.9), rgba(80,160,220,0.7));
    box-shadow: 0 0 18px rgba(120,190,255,0.4);
    animation: dropBreath 5s ease-in-out infinite;
  }

  @keyframes dropBreath {
    0%, 100% { transform: scaleY(0.55) scaleX(0.7); opacity: 0.5; }
    50%       { transform: scaleY(1)    scaleX(1);   opacity: 1; }
  }

  /* ===== 6. 弧 ===== */
  .arc-svg {
    width: 90px;
    height: 90px;
    transform: rotate(-90deg);
  }

  .arc-track {
    fill: none;
    stroke: rgba(255,255,255,0.08);
    stroke-width: 3;
  }

  .arc-fill {
    fill: none;
    stroke: rgba(160,210,255,0.85);
    stroke-width: 3;
    stroke-linecap: round;
    stroke-dasharray: 220;
    stroke-dashoffset: 220;
    animation: arcBreath 5s ease-in-out infinite;
    filter: drop-shadow(0 0 4px rgba(140,200,255,0.6));
  }

  @keyframes arcBreath {
    0%, 100% { stroke-dashoffset: 220; opacity: 0.4; }
    50%       { stroke-dashoffset: 0;   opacity: 1; }
  }

  @media (max-width: 600px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<h1>呼吸アニメーション比較</h1>

<div class="grid">

  <!-- 1. 泡 -->
  <div class="card">
    <div class="stage">
      <div class="bubble"></div>
    </div>
    <div class="label">泡</div>
  </div>

  <!-- 2. 光輪 -->
  <div class="card">
    <div class="stage">
      <div class="halo"></div>
    </div>
    <div class="label">光輪</div>
  </div>

  <!-- 3. 波紋 -->
  <div class="card">
    <div class="stage">
      <div class="ripple-wrap">
        <div class="ripple-ring"></div>
        <div class="ripple-ring"></div>
        <div class="ripple-ring"></div>
        <div class="ripple-core"></div>
      </div>
    </div>
    <div class="label">波紋</div>
  </div>

  <!-- 4. 霞 -->
  <div class="card">
    <div class="stage">
      <div class="haze"></div>
    </div>
    <div class="label">霞</div>
  </div>

  <!-- 5. 雫 -->
  <div class="card">
    <div class="stage">
      <div class="drop"></div>
    </div>
    <div class="label">雫</div>
  </div>

  <!-- 6. 弧 -->
  <div class="card">
    <div class="stage">
      <svg class="arc-svg" viewBox="0 0 90 90">
        <circle class="arc-track" cx="45" cy="45" r="35"/>
        <circle class="arc-fill"  cx="45" cy="45" r="35"/>
      </svg>
    </div>
    <div class="label">弧</div>
  </div>

</div>

</body>
</html>
