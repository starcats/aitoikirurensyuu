<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Audio Debug</title>
  <style>
    body { background: #111; color: #eee; font-family: monospace; padding: 40px; display: flex; flex-direction: column; gap: 20px; }
    button { padding: 16px 24px; border: 1px solid #555; border-radius: 8px; background: #222; color: #eee; font-size: 1rem; cursor: pointer; }
    button:active { background: #444; }
    #log { border: 1px solid #333; border-radius: 6px; padding: 16px; min-height: 120px; font-size: 0.85rem; line-height: 1.8; white-space: pre; }
    h2 { font-size: 0.9rem; color: #888; margin-bottom: -10px; }
  </style>
</head>
<body>

<h2>① TEST TONE（動く基準）— static button, gain.value</h2>
<button id="btn-a">TEST TONE（静的ボタン）</button>

<h2>② 動的ボタン — addEventListener で new AudioContext + gain.value</h2>
<div id="dynamic-wrap"></div>

<h2>③ 動的ボタン — addEventListener で new AudioContext + setValueAtTime + linearRamp</h2>
<div id="dynamic-wrap2"></div>

<h2>④ 動的ボタン — addEventListener で new AudioContext + gain.value + 6倍音</h2>
<div id="dynamic-wrap3"></div>

<div id="log">ログ：</div>

<script>
  const log = document.getElementById('log');
  function lg(msg) { log.textContent += '\n' + msg; }

  // ① 静的ボタン（動く基準）
  document.getElementById('btn-a').addEventListener('click', () => {
    lg('① clicked');
    const ctx = new AudioContext();
    lg('  state: ' + ctx.state);
    const osc = ctx.createOscillator();
    const g   = ctx.createGain();
    osc.frequency.value = 440;
    g.gain.value = 0.5;
    osc.connect(g);
    g.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 1);
    lg('  started');
  });

  // ② 動的ボタン — gain.value
  const wrap2 = document.getElementById('dynamic-wrap');
  const btn2  = document.createElement('button');
  btn2.textContent = '動的ボタン + gain.value';
  btn2.addEventListener('click', () => {
    lg('② clicked');
    const ctx = new AudioContext();
    lg('  state: ' + ctx.state);
    const osc = ctx.createOscillator();
    const g   = ctx.createGain();
    osc.frequency.value = 440;
    g.gain.value = 0.5;
    osc.connect(g);
    g.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 1);
    lg('  started');
  });
  wrap2.appendChild(btn2);

  // ③ 動的ボタン — setValueAtTime + linearRamp
  const wrap3 = document.getElementById('dynamic-wrap2');
  const btn3  = document.createElement('button');
  btn3.textContent = '動的ボタン + linearRamp';
  btn3.addEventListener('click', () => {
    lg('③ clicked');
    const ctx = new AudioContext();
    const now = ctx.currentTime;
    lg('  state: ' + ctx.state + '  currentTime: ' + now);
    const osc = ctx.createOscillator();
    const g   = ctx.createGain();
    osc.frequency.value = 440;
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(0.5, now + 0.012);
    g.gain.setValueAtTime(0.5, now + 0.012);
    osc.connect(g);
    g.connect(ctx.destination);
    osc.start(now);
    osc.stop(now + 1);
    lg('  started');
  });
  wrap3.appendChild(btn3);

  // ④ 動的ボタン — gain.value + 6倍音
  const HARMONICS = [1, 2, 3, 4, 5, 6];
  const H_AMPS    = [1.0, 0.6, 0.35, 0.2, 0.12, 0.08];
  const TOTAL_AMP = H_AMPS.reduce((a, b) => a + b, 0);
  const wrap4     = document.getElementById('dynamic-wrap3');
  const btn4      = document.createElement('button');
  btn4.textContent = '動的ボタン + gain.value + 6倍音';
  btn4.addEventListener('click', () => {
    lg('④ clicked');
    const ctx = new AudioContext();
    lg('  state: ' + ctx.state);
    HARMONICS.forEach((h, i) => {
      const osc   = ctx.createOscillator();
      const gNode = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = 440 * h;
      gNode.gain.value = H_AMPS[i] / TOTAL_AMP * 0.5;
      osc.connect(gNode);
      gNode.connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + 1);
    });
    lg('  started (6 oscs)');
  });
  wrap4.appendChild(btn4);
</script>
</body>
</html>
